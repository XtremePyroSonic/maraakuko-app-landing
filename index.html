<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mara Akụkọ — Pan-African news, in your pocket</title>
  <meta name="description" content="Mara Akụkọ delivers Pan-African news, original creator reporting, and source-balanced perspectives." />
  <link rel="icon" href="/assets/favicon.ico" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1612;
      color: #f0e8de;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 44px;
      font-style: italic;
      font-weight: 600;
      color: #f4c97a;
      margin: 0 0 16px;
    }
    p {
      font-size: 17px;
      max-width: 480px;
      line-height: 1.55;
      color: #a8b0ac;
      margin: 0 0 32px;
    }
    .stores {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stores a {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 9999px;
      background: #2eaf8e;
      color: #1a1612;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Mara Akụkọ</h1>
  <p>Pan-African news, in your pocket. Original creator reporting, source-balanced perspectives, and verified narratives across the continent.</p>
  <div class="stores">
    <a href="https://apps.apple.com/app/id0000000000">App Store</a>
    <a href="https://play.google.com/store/apps/details?id=com.panafrocore.panafrocore">Google Play</a>
  </div>
</body>
</html>
